
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .container { padding: 1.5rem 1rem 2rem; max-width: 680px; }
  .header { margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .header p { font-size: 14px; color: var(--text-secondary); }
  .step { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .step-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
  .step-title { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 1rem; }
  .waveform-wrap { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); height: 72px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; overflow: hidden; position: relative; cursor: pointer; }
  canvas.wave { width: 100%; height: 100%; display: block; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0 14px; height: 36px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-primary); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
  .btn:hover { background: var(--surface-1); }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--fill-accent); border-color: var(--fill-accent); color: var(--on-accent); }
  .btn.primary:hover { background: var(--fill-accent-hover); }
  .btn.danger { background: var(--bg-danger); border-color: var(--border-danger); color: var(--text-danger); }
  .btn.recording { background: var(--bg-danger); border-color: var(--border-danger); color: var(--text-danger); animation: pulse-border 1s infinite; }
  @keyframes pulse-border { 0%,100%{ opacity:1; } 50%{ opacity:0.6; } }
  .timer { font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .status { font-size: 13px; color: var(--text-muted); }
  .status.active { color: var(--text-accent); }
  .status.error { color: var(--text-danger); }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
  .compare-section { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .compare-card { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .compare-card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .mini-wave { height: 48px; border-radius: 6px; overflow: hidden; background: var(--surface-0); }
  .mini-wave canvas { width: 100%; height: 100%; }
  .upload-area { border: 1.5px dashed var(--border-strong); border-radius: var(--radius); padding: 2rem 1rem; text-align: center; cursor: pointer; transition: background 0.15s; margin-bottom: 1rem; }
  .upload-area:hover { background: var(--surface-1); }
  .upload-area p { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
  .upload-area span { font-size: 12px; color: var(--text-muted); }
  #fileInput { display: none; }
  .tip { font-size: 12px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-bar { height: 100%; background: var(--fill-accent); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
</style>

<div class="container">
  <h2 class="sr-only">Voice recording and comparison tool for language learners</h2>
  <div class="header">
    <h2>Voice comparison</h2>
    <p>Listen to the original recording, then record yourself and compare.</p>
  </div>

  <div class="step">
    <div class="step-label">Step 1</div>
    <div class="step-title">Original recording</div>
    <label class="upload-area" for="fileInput" id="uploadArea">
      <i class="ti ti-upload" style="font-size:24px; color:var(--text-muted);" aria-hidden="true"></i>
      <p>Upload an audio file to get started</p>
      <span>MP3, WAV, OGG, M4A — up to 20 MB</span>
    </label>
    <input type="file" id="fileInput" accept="audio/*">
    <div class="waveform-wrap" id="origWaveWrap" style="display:none;">
      <canvas id="origWave"></canvas>
    </div>
    <div class="controls" id="origControls" style="display:none;">
      <button class="btn primary" id="origPlayBtn" onclick="toggleOrig()">
        <i class="ti ti-player-play" aria-hidden="true"></i> Play
      </button>
      <div class="progress-bar-wrap" style="flex:1; min-width:80px;">
        <div class="progress-bar" id="origProgress"></div>
      </div>
      <span class="timer" id="origTimer">0:00</span>
    </div>
    <div class="tip" id="origStatus"><span></span></div>
  </div>

  <div class="step">
    <div class="step-label">Step 2</div>
    <div class="step-title">Your recording</div>
    <div class="waveform-wrap" id="recWaveWrap">
      <canvas id="recWave"></canvas>
    </div>
    <div class="controls">
      <button class="btn" id="recBtn" onclick="toggleRecord()">
        <i class="ti ti-microphone" aria-hidden="true"></i> Record
      </button>
      <button class="btn" id="recPlayBtn" onclick="toggleRec()" style="display:none;">
        <i class="ti ti-player-play" aria-hidden="true"></i> Play
      </button>
      <button class="btn danger" id="recClearBtn" onclick="clearRec()" style="display:none;">
        <i class="ti ti-trash" aria-hidden="true"></i> Discard
      </button>
      <span class="timer" id="recTimer">0:00</span>
      <span class="status" id="recStatus">Tap record to begin</span>
    </div>
  </div>

  <div class="compare-section" id="compareSection" style="display:none;">
    <div class="step-label">Comparison</div>
    <div class="step-title" style="margin-bottom:1rem;">Side by side</div>
    <div class="compare-grid">
      <div class="compare-card">
        <div class="compare-card-label">Original</div>
        <div class="mini-wave"><canvas id="miniOrig"></canvas></div>
        <button class="btn" style="margin-top:10px; width:100%; justify-content:center;" onclick="toggleOrig()">
          <i class="ti ti-player-play" id="miniOrigIcon" aria-hidden="true"></i> <span id="miniOrigLabel">Play</span>
        </button>
      </div>
      <div class="compare-card">
        <div class="compare-card-label">Your voice</div>
        <div class="mini-wave"><canvas id="miniRec"></canvas></div>
        <button class="btn" style="margin-top:10px; width:100%; justify-content:center;" onclick="toggleRec()">
          <i class="ti ti-player-play" id="miniRecIcon" aria-hidden="true"></i> <span id="miniRecLabel">Play</span>
        </button>
      </div>
    </div>
    <button class="btn primary" style="width:100%; justify-content:center;" onclick="playBoth()">
      <i class="ti ti-player-play" aria-hidden="true"></i> Play both back to back
    </button>
  </div>
</div>

<script>
let origAudio = null, recAudio = null;
let mediaRec = null, recChunks = [];
let isRecording = false;
let recTimerInt = null, recSecs = 0;
let origTimerInt = null;
let origAudioCtx = null, origAnalyser = null, origSource = null;
let recAudioCtx = null, recAnalyser = null, recSource = null;
let animFrameOrig = null, animFrameRec = null;

const $ = id => document.getElementById(id);

function formatTime(s) {
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
}

function drawStaticWave(canvas, audioBuffer, color) {
  if (!canvas || !audioBuffer) return;
  const ctx2 = canvas.getContext('2d');
  const W = canvas.offsetWidth || 300;
  const H = canvas.offsetHeight || 72;
  canvas.width = W * (window.devicePixelRatio||1);
  canvas.height = H * (window.devicePixelRatio||1);
  ctx2.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  ctx2.clearRect(0,0,W,H);
  const data = audioBuffer.getChannelData(0);
  const step = Math.ceil(data.length / W);
  ctx2.strokeStyle = color || '#378ADD';
  ctx2.lineWidth = 1.5;
  ctx2.beginPath();
  for (let i=0; i<W; i++) {
    let max = 0;
    for (let j=0; j<step; j++) {
      const v = Math.abs(data[i*step+j]||0);
      if (v>max) max=v;
    }
    const h = max * H * 0.85;
    const x = i;
    ctx2.moveTo(x, H/2 - h/2);
    ctx2.lineTo(x, H/2 + h/2);
  }
  ctx2.stroke();
}

function drawLiveWave(canvas, analyser, color, frame) {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  function loop() {
    frame.id = requestAnimationFrame(loop);
    analyser.getByteTimeDomainData(buf);
    const ctx2 = canvas.getContext('2d');
    const W = canvas.offsetWidth||300, H = canvas.offsetHeight||72;
    canvas.width = W*(window.devicePixelRatio||1);
    canvas.height = H*(window.devicePixelRatio||1);
    ctx2.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
    ctx2.clearRect(0,0,W,H);
    ctx2.strokeStyle = color||'#E24B4A';
    ctx2.lineWidth = 1.5;
    ctx2.beginPath();
    const sliceW = W / buf.length;
    let x=0;
    for (let i=0;i<buf.length;i++) {
      const v = buf[i]/128.0;
      const y = v*H/2;
      if (i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
      x+=sliceW;
    }
    ctx2.lineTo(W, H/2);
    ctx2.stroke();
  }
  loop();
}

$('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  origAudio = new Audio(url);
  origAudio.addEventListener('timeupdate', () => {
    const pct = origAudio.duration ? origAudio.currentTime/origAudio.duration*100 : 0;
    $('origProgress').style.width = pct+'%';
    $('origTimer').textContent = formatTime(origAudio.currentTime);
  });
  origAudio.addEventListener('ended', () => {
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
    clearInterval(origTimerInt);
  });
  $('uploadArea').style.display = 'none';
  $('origWaveWrap').style.display = 'flex';
  $('origControls').style.display = 'flex';
  $('origStatus').innerHTML = '<i class="ti ti-check" style="color:var(--text-success);font-size:14px;" aria-hidden="true"></i><span style="color:var(--text-secondary);">'+file.name+'</span>';
  const arrBuf = await file.arrayBuffer();
  const actx = new (window.AudioContext||window.webkitAudioContext)();
  const decoded = await actx.decodeAudioData(arrBuf);
  drawStaticWave($('origWave'), decoded, '#378ADD');
  drawStaticWave($('miniOrig'), decoded, '#378ADD');
  checkCompare();
});

function toggleOrig() {
  if (!origAudio) return;
  if (origAudio.paused) {
    origAudio.play();
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
    $('miniOrigIcon').className = 'ti ti-player-pause';
    $('miniOrigLabel').textContent = 'Pause';
  } else {
    origAudio.pause();
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
    $('miniOrigIcon').className = 'ti ti-player-play';
    $('miniOrigLabel').textContent = 'Play';
  }
}

async function toggleRecord() {
  if (isRecording) {
    mediaRec.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks = [];
    recSecs = 0;
    $('recTimer').textContent = '0:00';
    $('recStatus').textContent = 'Recording…';
    $('recStatus').className = 'status active';
    mediaRec = new MediaRecorder(stream);
    const frameObj = {};
    if (window.AudioContext||window.webkitAudioContext) {
      recAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
      recAnalyser = recAudioCtx.createAnalyser();
      recAnalyser.fftSize = 512;
      recSource = recAudioCtx.createMediaStreamSource(stream);
      recSource.connect(recAnalyser);
      if (animFrameRec) cancelAnimationFrame(animFrameRec);
      drawLiveWave($('recWave'), recAnalyser, '#E24B4A', frameObj);
      animFrameRec = frameObj.id;
    }
    mediaRec.addEventListener('dataavailable', e => { if(e.data.size>0) recChunks.push(e.data); });
    mediaRec.addEventListener('stop', async () => {
      isRecording = false;
      clearInterval(recTimerInt);
      stream.getTracks().forEach(t=>t.stop());
      if (frameObj.id) cancelAnimationFrame(frameObj.id);
      $('recBtn').innerHTML = '<i class="ti ti-microphone" aria-hidden="true"></i> Record again';
      $('recBtn').className = 'btn';
      $('recStatus').textContent = 'Recording saved';
      $('recStatus').className = 'status';
      const blob = new Blob(recChunks, {type:'audio/webm'});
      const url = URL.createObjectURL(blob);
      recAudio = new Audio(url);
      recAudio.addEventListener('ended', () => {
        $('recPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
        $('miniRecIcon').className = 'ti ti-player-play';
        $('miniRecLabel').textContent = 'Play';
      });
      $('recPlayBtn').style.display = 'inline-flex';
      $('recClearBtn').style.display = 'inline-flex';
      const arrBuf = await blob.arrayBuffer();
      const actx = new (window.AudioContext||window.webkitAudioContext)();
      try {
        const decoded = await actx.decodeAudioData(arrBuf);
        drawStaticWave($('recWave'), decoded, '#E24B4A');
        drawStaticWave($('miniRec'), decoded, '#E24B4A');
      } catch(err) {
        const c = $('recWave');
        const ctx2 = c.getContext('2d');
        const W=c.offsetWidth||300, H=c.offsetHeight||72;
        c.width=W; c.height=H;
        ctx2.strokeStyle='#E24B4A';
        ctx2.lineWidth=1.5;
        ctx2.beginPath();
        for(let i=0;i<W;i++){const r=Math.random()*H*0.4+H*0.1;ctx2.moveTo(i,H/2-r/2);ctx2.lineTo(i,H/2+r/2);}
        ctx2.stroke();
      }
      checkCompare();
    });
    mediaRec.start();
    isRecording = true;
    $('recBtn').innerHTML = '<i class="ti ti-player-stop" aria-hidden="true"></i> Stop';
    $('recBtn').className = 'btn recording';
    recTimerInt = setInterval(()=>{ recSecs++; $('recTimer').textContent = formatTime(recSecs); }, 1000);
  } catch(err) {
    $('recStatus').textContent = 'Microphone access denied';
    $('recStatus').className = 'status error';
  }
}

function toggleRec() {
  if (!recAudio) return;
  if (recAudio.paused) {
    recAudio.play();
    $('recPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
    $('miniRecIcon').className = 'ti ti-player-pause';
    $('miniRecLabel').textContent = 'Pause';
  } else {
    recAudio.pause();
    $('recPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
    $('miniRecIcon').className = 'ti ti-player-play';
    $('miniRecLabel').textContent = 'Play';
  }
}

function clearRec() {
  recAudio = null;
  $('recPlayBtn').style.display = 'none';
  $('recClearBtn').style.display = 'none';
  $('recBtn').innerHTML = '<i class="ti ti-microphone" aria-hidden="true"></i> Record';
  $('recBtn').className = 'btn';
  $('recTimer').textContent = '0:00';
  $('recStatus').textContent = 'Tap record to begin';
  $('recStatus').className = 'status';
  const c = $('recWave');
  if (c) { c.getContext('2d').clearRect(0,0,c.width,c.height); }
  $('compareSection').style.display = 'none';
}

function checkCompare() {
  if (origAudio && recAudio) {
    $('compareSection').style.display = 'block';
  }
}

function playBoth() {
  if (!origAudio || !recAudio) return;
  origAudio.currentTime = 0;
  origAudio.play();
  $('origPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
  origAudio.addEventListener('ended', function onEnd() {
    origAudio.removeEventListener('ended', onEnd);
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
    setTimeout(()=>{
      recAudio.currentTime = 0;
      recAudio.play();
      $('recPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
      recAudio.addEventListener('ended', ()=>{
        $('recPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
      }, {once:true});
    }, 500);
  }, {once:true});
}
</script>
