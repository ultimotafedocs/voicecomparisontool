<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Comparison – Practice Your Pronunciation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:        #0D7377;
    --teal-light:  #14AAAF;
    --teal-bg:     #E6F6F7;
    --coral:       #E8543A;
    --coral-light: #FAEAE7;
    --coral-bg:    #FFF3F0;
    --gold:        #F5A623;
    --gold-bg:     #FEF6E7;
    --ink:         #1A2535;
    --ink-mid:     #4A5568;
    --ink-light:   #718096;
    --surface:     #FFFFFF;
    --bg:          #F0F7F8;
    --border:      #C9E2E4;
    --radius-lg:   20px;
    --radius-md:   14px;
    --radius-sm:   10px;
    --shadow:      0 4px 24px rgba(13,115,119,0.10);
    --shadow-btn:  0 4px 14px rgba(13,115,119,0.25);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
    padding: 32px 24px 28px;
    text-align: center;
    color: #fff;
  }
  .page-header .icon-badge {
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    font-size: 26px;
  }
  .page-header h1 {
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .page-header p {
    font-size: clamp(15px, 3.5vw, 17px);
    font-weight: 600;
    opacity: 0.88;
    line-height: 1.45;
    max-width: 420px;
    margin: 0 auto;
  }

  /* ── MAIN CONTAINER ── */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 22px 16px;
    border-bottom: 2px solid var(--bg);
  }
  .step-badge {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .step-badge.teal { background: var(--teal-bg); color: var(--teal); }
  .step-badge.coral { background: var(--coral-light); color: var(--coral); }
  .step-badge.gold { background: var(--gold-bg); color: var(--gold); }

  .card-header-text {}
  .card-eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 2px;
  }
  .card-title {
    font-size: clamp(17px, 4vw, 20px);
    font-weight: 800;
    color: var(--ink);
    line-height: 1.2;
  }

  .card-body { padding: 20px 22px 22px; }

  /* ── UPLOAD AREA ── */
  .upload-area {
    border: 2.5px dashed var(--teal-light);
    border-radius: var(--radius-md);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    background: var(--teal-bg);
    transition: background 0.18s, border-color 0.18s;
    display: block;
  }
  .upload-area:hover, .upload-area:focus {
    background: #cceef0;
    border-color: var(--teal);
    outline: none;
  }
  .upload-icon {
    font-size: 40px;
    color: var(--teal);
    display: block;
    margin-bottom: 12px;
  }
  .upload-area h3 {
    font-size: 18px;
    font-weight: 800;
    color: var(--teal);
    margin-bottom: 6px;
  }
  .upload-area p {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-mid);
    margin-bottom: 4px;
  }
  .upload-area small {
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 600;
  }
  #fileInput { display: none; }

  /* ── WAVEFORM ── */
  .waveform-wrap {
    border-radius: var(--radius-md);
    height: 80px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
    margin-bottom: 18px;
  }
  .waveform-wrap.teal-wave { background: var(--teal-bg); border: 2px solid var(--border); }
  .waveform-wrap.coral-wave { background: var(--coral-bg); border: 2px solid #FBCEC8; }
  canvas.wave { width: 100%; height: 100%; display: block; }

  .waveform-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--ink-light); font-size: 14px; font-weight: 600;
  }
  .waveform-placeholder i { font-size: 28px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 26px;
    height: 58px;
    border-radius: var(--radius-md);
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(16px, 3.5vw, 18px);
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .btn i { font-size: 22px; }
  .btn:active { transform: scale(0.97); }

  .btn-teal {
    background: var(--teal);
    color: #fff;
    box-shadow: var(--shadow-btn);
  }
  .btn-teal:hover { background: #0a5e61; box-shadow: 0 6px 20px rgba(13,115,119,0.35); }

  .btn-coral {
    background: var(--coral);
    color: #fff;
    box-shadow: 0 4px 14px rgba(232,84,58,0.30);
  }
  .btn-coral:hover { background: #c9432a; }

  .btn-recording {
    background: #c9432a;
    color: #fff;
    box-shadow: 0 0 0 0 rgba(232,84,58,0.5);
    animation: pulse-ring 1.2s ease infinite;
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(232,84,58,0.5); }
    70% { box-shadow: 0 0 0 12px rgba(232,84,58,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,84,58,0); }
  }

  .btn-outline {
    background: #fff;
    color: var(--teal);
    border: 2.5px solid var(--teal);
    box-shadow: none;
  }
  .btn-outline:hover { background: var(--teal-bg); }

  .btn-ghost-danger {
    background: var(--coral-bg);
    color: var(--coral);
    border: 2px solid #FBCEC8;
  }
  .btn-ghost-danger:hover { background: #FBD9D4; }

  .btn-gold {
    background: var(--gold);
    color: #fff;
    box-shadow: 0 4px 14px rgba(245,166,35,0.35);
  }
  .btn-gold:hover { background: #d4891a; }

  .btn-full { width: 100%; }

  /* ── BUTTON ROW ── */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .btn-row .btn { flex: 1 1 auto; min-width: 130px; }

  /* ── TIMER + STATUS ── */
  .meta-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .timer {
    font-size: 20px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 14px; font-weight: 700;
    padding: 5px 13px;
    border-radius: 99px;
  }
  .status-pill.idle { background: #EDF2F7; color: var(--ink-mid); }
  .status-pill.active { background: var(--coral-light); color: var(--coral); }
  .status-pill.done { background: #E6FFED; color: #276749; }
  .status-pill.error { background: #FFF0EE; color: var(--coral); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    flex: 1; min-width: 80px;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar { height: 100%; background: var(--teal); border-radius: 99px; width: 0%; transition: width 0.1s linear; }

  /* ── FILE LOADED INFO ── */
  .file-info {
    display: flex; align-items: center; gap: 10px;
    background: var(--teal-bg);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 14px; font-weight: 700; color: var(--teal);
  }
  .file-info i { font-size: 18px; }

  /* ── COMPARE SECTION ── */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }
  .compare-card {
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 16px;
    border: 2px solid var(--border);
  }
  .compare-card-label {
    font-size: 13px; font-weight: 800;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .compare-card-label.teal { color: var(--teal); }
  .compare-card-label.coral { color: var(--coral); }
  .mini-wave { height: 52px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
  .mini-wave.teal-wave { background: var(--teal-bg); }
  .mini-wave.coral-wave { background: var(--coral-bg); }
  .mini-wave canvas { width: 100%; height: 100%; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 2px solid var(--bg); margin: 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .page-header { padding: 24px 16px 22px; }
    .card-header { padding: 16px 16px 14px; }
    .card-body { padding: 16px 16px 18px; }
    .compare-grid { grid-template-columns: 1fr; }
    .btn { height: 56px; font-size: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .btn-recording { animation: none; }
    .status-dot { animation: none; }
  }
</style>
</head>
<body>

<header class="page-header" role="banner">
  <div class="icon-badge" aria-hidden="true"><i class="ti ti-ear"></i></div>
  <h1>Pronunciation Practice</h1>
  <p>Listen to the example, then record yourself and compare!</p>
</header>

<main class="main" aria-label="Voice comparison tool">

  <!-- STEP 1: ORIGINAL RECORDING -->
  <div class="card" role="region" aria-labelledby="step1-title">
    <div class="card-header">
      <div class="step-badge teal" aria-hidden="true">1</div>
      <div class="card-header-text">
        <div class="card-eyebrow">Step 1</div>
        <h2 class="card-title" id="step1-title">Listen to the Example</h2>
      </div>
    </div>
    <div class="card-body">

      <label class="upload-area" for="fileInput" id="uploadArea" tabindex="0"
        role="button" aria-label="Upload an audio file">
        <i class="ti ti-upload upload-icon" aria-hidden="true"></i>
        <h3>Upload Audio File</h3>
        <p>Tap here to choose a recording</p>
        <small>MP3, WAV, OGG, M4A — up to 20 MB</small>
      </label>
      <input type="file" id="fileInput" accept="audio/*" aria-label="Choose audio file">

      <div id="fileInfo" style="display:none;">
        <div class="file-info" id="fileInfoBar">
          <i class="ti ti-circle-check" aria-hidden="true"></i>
          <span id="fileInfoName"></span>
        </div>
        <div class="waveform-wrap teal-wave" id="origWaveWrap">
          <canvas id="origWave" aria-hidden="true"></canvas>
        </div>
        <div class="btn-row">
          <button class="btn btn-teal" id="origPlayBtn" onclick="toggleOrig()"
            aria-label="Play original recording">
            <i class="ti ti-player-play" aria-hidden="true"></i> Play Example
          </button>
          <div class="progress-wrap">
            <div class="progress-bar" id="origProgress"></div>
          </div>
          <span class="timer" id="origTimer" aria-live="polite">0:00</span>
        </div>
      </div>

      <div id="origStatus" style="display:none;" aria-live="polite"></div>
    </div>
  </div>

  <!-- STEP 2: YOUR RECORDING -->
  <div class="card" role="region" aria-labelledby="step2-title">
    <div class="card-header">
      <div class="step-badge coral" aria-hidden="true">2</div>
      <div class="card-header-text">
        <div class="card-eyebrow">Step 2</div>
        <h2 class="card-title" id="step2-title">Record Your Voice</h2>
      </div>
    </div>
    <div class="card-body">

      <div class="waveform-wrap coral-wave" id="recWaveWrap" aria-label="Your recording waveform">
        <div class="waveform-placeholder" id="recPlaceholder" aria-hidden="true">
          <i class="ti ti-microphone-off"></i>
          <span>Your voice will appear here</span>
        </div>
        <canvas id="recWave" aria-hidden="true" style="display:none;"></canvas>
      </div>

      <div class="btn-row">
        <button class="btn btn-coral" id="recBtn" onclick="toggleRecord()"
          aria-label="Start recording your voice">
          <i class="ti ti-microphone" aria-hidden="true"></i> <span id="recBtnLabel">Record My Voice</span>
        </button>
        <button class="btn btn-outline" id="recPlayBtn" onclick="toggleRec()"
          style="display:none;" aria-label="Play back your recording">
          <i class="ti ti-player-play" aria-hidden="true"></i> Play Mine
        </button>
        <button class="btn btn-ghost-danger" id="recClearBtn" onclick="clearRec()"
          style="display:none;" aria-label="Discard and re-record">
          <i class="ti ti-trash" aria-hidden="true"></i> Discard
        </button>
      </div>

      <div class="meta-row">
        <span class="timer" id="recTimer" aria-live="polite">0:00</span>
        <span class="status-pill idle" id="recStatus" aria-live="polite">
          Tap "Record My Voice" to begin
        </span>
      </div>

    </div>
  </div>

  <!-- STEP 3: COMPARE -->
  <div class="card" id="compareSection" style="display:none;"
    role="region" aria-labelledby="step3-title">
    <div class="card-header">
      <div class="step-badge gold" aria-hidden="true"><i class="ti ti-stars" style="font-size:20px;"></i></div>
      <div class="card-header-text">
        <div class="card-eyebrow">Step 3</div>
        <h2 class="card-title" id="step3-title">Compare Side by Side</h2>
      </div>
    </div>
    <div class="card-body">

      <div class="compare-grid">
        <div class="compare-card">
          <div class="compare-card-label teal">📖 Example</div>
          <div class="mini-wave teal-wave"><canvas id="miniOrig" aria-hidden="true"></canvas></div>
          <button class="btn btn-teal btn-full" onclick="toggleOrig()" style="height:50px; font-size:16px;">
            <i class="ti ti-player-play" id="miniOrigIcon" aria-hidden="true"></i>
            <span id="miniOrigLabel">Play</span>
          </button>
        </div>
        <div class="compare-card">
          <div class="compare-card-label coral">🎤 My Voice</div>
          <div class="mini-wave coral-wave"><canvas id="miniRec" aria-hidden="true"></canvas></div>
          <button class="btn btn-coral btn-full" onclick="toggleRec()" style="height:50px; font-size:16px;">
            <i class="ti ti-player-play" id="miniRecIcon" aria-hidden="true"></i>
            <span id="miniRecLabel">Play</span>
          </button>
        </div>
      </div>

      <button class="btn btn-gold btn-full" onclick="playBoth()"
        aria-label="Play both recordings back to back">
        <i class="ti ti-player-play-filled" aria-hidden="true"></i>
        Play Both — Example, then Mine
      </button>

    </div>
  </div>

</main>

<script>
let origAudio = null, recAudio = null;
let mediaRec = null, recChunks = [];
let isRecording = false;
let recTimerInt = null, recSecs = 0;
let origTimerInt = null;
let recAudioCtx = null, recAnalyser = null, recSource = null;
let animFrameRec = null;

const $ = id => document.getElementById(id);

function formatTime(s) {
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function setStatus(el, text, type) {
  el.textContent = text;
  el.className = 'status-pill ' + (type || 'idle');
  if (type === 'active') {
    const dot = document.createElement('span');
    dot.className = 'status-dot';
    el.prepend(dot);
  }
}

function drawStaticWave(canvas, audioBuffer, color) {
  if (!canvas || !audioBuffer) return;
  const ctx2 = canvas.getContext('2d');
  const W = canvas.offsetWidth || 300;
  const H = canvas.offsetHeight || 80;
  canvas.width = W * (window.devicePixelRatio||1);
  canvas.height = H * (window.devicePixelRatio||1);
  ctx2.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  ctx2.clearRect(0,0,W,H);
  const data = audioBuffer.getChannelData(0);
  const step = Math.ceil(data.length / W);
  ctx2.strokeStyle = color;
  ctx2.lineWidth = 1.5;
  ctx2.beginPath();
  for (let i=0; i<W; i++) {
    let max = 0;
    for (let j=0; j<step; j++) {
      const v = Math.abs(data[i*step+j]||0);
      if (v>max) max=v;
    }
    const h = max * H * 0.85;
    ctx2.moveTo(i, H/2 - h/2);
    ctx2.lineTo(i, H/2 + h/2);
  }
  ctx2.stroke();
}

function drawLiveWave(canvas, analyser, color, frame) {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  function loop() {
    frame.id = requestAnimationFrame(loop);
    analyser.getByteTimeDomainData(buf);
    const ctx2 = canvas.getContext('2d');
    const W = canvas.offsetWidth||300, H = canvas.offsetHeight||80;
    canvas.width = W*(window.devicePixelRatio||1);
    canvas.height = H*(window.devicePixelRatio||1);
    ctx2.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
    ctx2.clearRect(0,0,W,H);
    ctx2.strokeStyle = color;
    ctx2.lineWidth = 1.5;
    ctx2.beginPath();
    const sliceW = W / buf.length;
    let x=0;
    for (let i=0; i<buf.length; i++) {
      const v = buf[i]/128.0;
      const y = v*H/2;
      if (i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
      x+=sliceW;
    }
    ctx2.lineTo(W, H/2);
    ctx2.stroke();
  }
  loop();
}

$('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  origAudio = new Audio(url);
  origAudio.addEventListener('timeupdate', () => {
    const pct = origAudio.duration ? origAudio.currentTime/origAudio.duration*100 : 0;
    $('origProgress').style.width = pct+'%';
    $('origTimer').textContent = formatTime(origAudio.currentTime);
  });
  origAudio.addEventListener('ended', () => {
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play Example';
    $('miniOrigIcon').className = 'ti ti-player-play';
    $('miniOrigLabel').textContent = 'Play';
  });
  $('uploadArea').style.display = 'none';
  $('fileInfo').style.display = 'block';
  $('fileInfoName').textContent = file.name;
  const arrBuf = await file.arrayBuffer();
  const actx = new (window.AudioContext||window.webkitAudioContext)();
  const decoded = await actx.decodeAudioData(arrBuf);
  drawStaticWave($('origWave'), decoded, '#0D7377');
  drawStaticWave($('miniOrig'), decoded, '#0D7377');
  checkCompare();
});

function toggleOrig() {
  if (!origAudio) return;
  if (origAudio.paused) {
    origAudio.play();
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
    $('miniOrigIcon').className = 'ti ti-player-pause';
    $('miniOrigLabel').textContent = 'Pause';
  } else {
    origAudio.pause();
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play Example';
    $('miniOrigIcon').className = 'ti ti-player-play';
    $('miniOrigLabel').textContent = 'Play';
  }
}

async function toggleRecord() {
  if (isRecording) {
    mediaRec.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks = [];
    recSecs = 0;
    $('recTimer').textContent = '0:00';
    setStatus($('recStatus'), '● Recording now…', 'active');
    $('recPlaceholder').style.display = 'none';
    $('recWave').style.display = 'block';
    mediaRec = new MediaRecorder(stream);
    const frameObj = {};
    if (window.AudioContext||window.webkitAudioContext) {
      recAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
      recAnalyser = recAudioCtx.createAnalyser();
      recAnalyser.fftSize = 512;
      recSource = recAudioCtx.createMediaStreamSource(stream);
      recSource.connect(recAnalyser);
      if (animFrameRec) cancelAnimationFrame(animFrameRec);
      drawLiveWave($('recWave'), recAnalyser, '#E8543A', frameObj);
      animFrameRec = frameObj.id;
    }
    mediaRec.addEventListener('dataavailable', e => { if(e.data.size>0) recChunks.push(e.data); });
    mediaRec.addEventListener('stop', async () => {
      isRecording = false;
      clearInterval(recTimerInt);
      stream.getTracks().forEach(t=>t.stop());
      if (frameObj.id) cancelAnimationFrame(frameObj.id);
      $('recBtn').innerHTML = '<i class="ti ti-microphone" aria-hidden="true"></i> <span id="recBtnLabel">Record Again</span>';
      $('recBtn').className = 'btn btn-coral';
      setStatus($('recStatus'), '✓ Recording saved!', 'done');
      const blob = new Blob(recChunks, {type:'audio/webm'});
      const url = URL.createObjectURL(blob);
      recAudio = new Audio(url);
      recAudio.addEventListener('ended', () => {
        $('recPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play Mine';
        $('miniRecIcon').className = 'ti ti-player-play';
        $('miniRecLabel').textContent = 'Play';
      });
      $('recPlayBtn').style.display = 'inline-flex';
      $('recClearBtn').style.display = 'inline-flex';
      const arrBuf = await blob.arrayBuffer();
      const actx = new (window.AudioContext||window.webkitAudioContext)();
      try {
        const decoded = await actx.decodeAudioData(arrBuf);
        drawStaticWave($('recWave'), decoded, '#E8543A');
        drawStaticWave($('miniRec'), decoded, '#E8543A');
      } catch(err) {
        // fallback random wave
        const c = $('recWave');
        const ctx2 = c.getContext('2d');
        const W=c.offsetWidth||300, H=c.offsetHeight||80;
        c.width=W; c.height=H;
        ctx2.strokeStyle='#E8543A'; ctx2.lineWidth=1.5; ctx2.beginPath();
        for(let i=0;i<W;i++){const r=Math.random()*H*0.4+H*0.1;ctx2.moveTo(i,H/2-r/2);ctx2.lineTo(i,H/2+r/2);}
        ctx2.stroke();
      }
      checkCompare();
    });
    mediaRec.start();
    isRecording = true;
    $('recBtn').innerHTML = '<i class="ti ti-player-stop" aria-hidden="true"></i> <span>Stop Recording</span>';
    $('recBtn').className = 'btn btn-recording';
    recTimerInt = setInterval(()=>{ recSecs++; $('recTimer').textContent = formatTime(recSecs); }, 1000);
  } catch(err) {
    setStatus($('recStatus'), 'Microphone access denied', 'error');
  }
}

function toggleRec() {
  if (!recAudio) return;
  if (recAudio.paused) {
    recAudio.play();
    $('recPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
    $('miniRecIcon').className = 'ti ti-player-pause';
    $('miniRecLabel').textContent = 'Pause';
  } else {
    recAudio.pause();
    $('recPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play Mine';
    $('miniRecIcon').className = 'ti ti-player-play';
    $('miniRecLabel').textContent = 'Play';
  }
}

function clearRec() {
  recAudio = null;
  $('recPlayBtn').style.display = 'none';
  $('recClearBtn').style.display = 'none';
  $('recBtn').innerHTML = '<i class="ti ti-microphone" aria-hidden="true"></i> <span id="recBtnLabel">Record My Voice</span>';
  $('recBtn').className = 'btn btn-coral';
  $('recTimer').textContent = '0:00';
  setStatus($('recStatus'), 'Tap "Record My Voice" to begin', 'idle');
  $('recWave').style.display = 'none';
  $('recPlaceholder').style.display = 'flex';
  const c = $('recWave');
  if (c) { c.getContext('2d').clearRect(0,0,c.width,c.height); }
  const cm = $('miniRec');
  if (cm) { cm.getContext('2d').clearRect(0,0,cm.width,cm.height); }
  $('compareSection').style.display = 'none';
}

function checkCompare() {
  if (origAudio && recAudio) {
    $('compareSection').style.display = 'block';
    $('compareSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function playBoth() {
  if (!origAudio || !recAudio) return;
  origAudio.currentTime = 0;
  origAudio.play();
  $('origPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
  origAudio.addEventListener('ended', function onEnd() {
    origAudio.removeEventListener('ended', onEnd);
    $('origPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play Example';
    setTimeout(()=>{
      recAudio.currentTime = 0;
      recAudio.play();
      $('recPlayBtn').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
      recAudio.addEventListener('ended', ()=>{
        $('recPlayBtn').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play Mine';
      }, {once:true});
    }, 500);
  }, {once:true});
}

// Allow keyboard activation of upload area
$('uploadArea').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    $('fileInput').click();
  }
});
</script>
